<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Quiz Game with Question Creator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <!-- Navigation Tabs -->
    <div class="top-nav">
      <button id="tab-play" class="tab-btn active">🎮 Play Quiz</button>
      <button id="tab-add" class="tab-btn">➕ Add Question</button>
    </div>

    <!-- Quiz View Card -->
    <div id="quiz-card" class="card">
      <div class="progress-bar-container">
        <div id="progress-bar" class="progress-bar"></div>
      </div>

      <div id="quiz-body">
        <div class="quiz-header">
          <span id="question-count">Question 1/3</span>
          <span class="timer">Time Left: <span id="time-left">15</span>s</span>
        </div>

        <div id="question-text" class="question">Loading question...</div>

        <!-- Multiple Choice Options Container -->
        <div id="button-options" class="options-grid"></div>

        <!-- Interactive Slider Options Container -->
        <div id="slider-options" class="slider-container hide">
          <div id="slider-val" class="slider-display">50</div>
          <input type="range" id="interactive-slider" min="0" max="100" value="50">
        </div>

        <button id="submit-btn" class="action-btn">Submit Answer</button>
        <div id="feedback" class="feedback"></div>
      </div>

      <!-- Results View -->
      <div id="results-body" class="hide">
        <h2>Quiz Completed! 🎉</h2>
        <p id="final-score" style="font-size: 1.5rem;"></p>
        <button id="restart-btn" class="action-btn">Play Again</button>
      </div>
    </div>

    <!-- Question Upload Form Card -->
    <div id="form-card" class="card hide">
      <h2>Add New Question</h2>
      <form id="add-question-form">
        <div class="form-group">
          <label for="q-type">Question Type</label>
          <select id="q-type">
            <option value="buttons">Multiple Choice (Buttons)</option>
            <option value="slider">Range Slider (Number/Year)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="q-text">Question</label>
          <input type="text" id="q-text" placeholder="e.g., In what year was JavaScript created?" required>
        </div>

        <!-- Multiple Choice Inputs -->
        <div id="form-buttons-group">
          <div class="form-group">
            <label>Options (Separate by comma)</label>
            <input type="text" id="q-options" placeholder="Option 1, Option 2, Option 3, Option 4">
          </div>
          <div class="form-group">
            <label>Correct Answer (Exact match)</label>
            <input type="text" id="q-correct-button" placeholder="Option 1">
          </div>
        </div>

        <!-- Slider Inputs -->
        <div id="form-slider-group" class="hide">
          <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
              <label>Min Value</label>
              <input type="number" id="q-min" value="1900">
            </div>
            <div class="form-group" style="flex: 1;">
              <label>Max Value</label>
              <input type="number" id="q-max" value="2026">
            </div>
          </div>
          <div class="form-group">
            <label>Correct Value</label>
            <input type="number" id="q-correct-slider" placeholder="1995">
          </div>
        </div>

        <button type="submit" class="action-btn">Add to Quiz Pool</button>
      </form>
      <div id="form-feedback" class="feedback"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
